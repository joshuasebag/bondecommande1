<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Console Admin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: 400px 1fr; gap: 20px; max-width: 1600px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .title { font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .edit-btn { background: #f59e0b; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="grid">
        <!-- Colonne Gauche -->
        <div>
            <div class="card">
                <div class="title">Chauffeurs</div>
                <form id="driverForm"><input type="text" id="dName" placeholder="Nom" required><input type="text" id="dPass" placeholder="MDP" required><button type="submit">Ajouter</button></form>
                <table><tbody id="dBody"></tbody></table>
            </div>
            <div class="card">
                <div class="title">Véhicules</div>
                <form id="vehForm"><input type="text" id="vModel" placeholder="Modèle" required><input type="text" id="vPlate" placeholder="Plaque" required><button type="submit">Ajouter</button></form>
                <table><tbody id="vBody"></tbody></table>
            </div>
        </div>
        <!-- Colonne Droite -->
        <div>
            <div class="card">
                <div class="title">CA Chauffeurs</div>
                <div id="stats" style="display:flex; gap:10px;"></div>
            </div>
            <div class="card">
                <div class="title">Courses</div>
                <table><thead><tr><th>Date</th><th>Trajet</th><th>Chauffeur</th><th>Statut</th></tr></thead><tbody id="oBody"></tbody></table>
            </div>
        </div>
    </div>
    <!-- Modal -->
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
        <div style="background:white; padding:20px; border-radius:8px;">
            <h3>Modifier MDP</h3>
            <input type="hidden" id="editId"><input type="text" id="editPass" style="margin:10px 0;">
            <button onclick="savePass()">Enregistrer</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>
