<!DOCTYPE html>
<html lang="fr">
<head>
    <script>if (sessionStorage.getItem('admin_connected') !== 'true') window.location.href = 'login.html';</script>
    <meta charset="UTF-8">
    <title>Console Admin VTC</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 400px 1fr; gap: 20px; max-width: 1600px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        button { padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        .btn-icon { background: none; color: #64748b; border: 1px solid #cbd5e1; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="grid">
        <!-- Colonne Gauche -->
        <div>
            <div class="card">
                <div class="title">Chauffeurs</div>
                <form id="driverForm"><input type="text" id="driverName" placeholder="Nom" required><input type="text" id="driverPassword" placeholder="MDP" required><button type="submit">Ajouter</button></form>
                <table><tbody id="driversTableBody"></tbody></table>
            </div>
            <div class="card">
                <div class="title">Véhicules</div>
                <form id="vehicleForm"><input type="text" id="vehicleModel" placeholder="Modèle" required><input type="text" id="vehiclePlate" placeholder="Plaque" required><button type="submit">Ajouter</button></form>
                <table><tbody id="vehiclesTableBody"></tbody></table>
            </div>
        </div>
        <!-- Colonne Droite -->
        <div>
            <div class="card">
                <div class="title">Suivi CA & Courses</div>
                <div id="stats"></div>
                <table><thead><tr><th>Date</th><th>Trajet</th><th>Chauffeur</th><th>Statut</th><th>Action</th></tr></thead><tbody id="ordersTableBody"></tbody></table>
            </div>
        </div>
    </div>
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
        <div style="background:white; padding:20px; border-radius:8px;">
            <h3>Modifier MDP</h3>
            <input type="hidden" id="editId"><input type="text" id="editPass"><button onclick="savePass()">Enregistrer</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>
