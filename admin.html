<!DOCTYPE html>
<html lang="fr">
<head>
    <script>if (sessionStorage.getItem('admin_connected') !== 'true') window.location.href = 'login.html';</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Admin VTC</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --bg: #f1f5f9; --nav-bg: #0f172a; --card-bg: #ffffff; --text-main: #0f172a; --border: #e2e8f0; --radius: 12px; }
        body { background-color: var(--bg); font-family: sans-serif; }
        .top-nav { background-color: var(--nav-bg); color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; height: 70px; }
        .nav-tabs { display: flex; height: 100%; }
        .nav-tab { padding: 0 24px; display: flex; align-items: center; gap: 10px; color: #cbd5e1; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; }
        .nav-tab.active { color: white; border-bottom-color: var(--primary); background: rgba(255,255,255,0.05); }
        .main-content { padding: 30px; max-width: 1600px; margin: 0 auto; }
        .view-section { display: none; } .view-section.active { display: block; }
        .grid { display: grid; grid-template-columns: 400px 1fr; gap: 24px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 24px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 16px; } label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; }
        button.btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .action-icon { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; background: white; margin-right: 5px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); align-items:center; justify-content:center; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 400px; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="brand"><i class="fa-solid fa-compass"></i> Admin VTC</div>
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchView('orders-view', this)"><i class="fa-solid fa-list"></i> Commandes</div>
            <div class="nav-tab" onclick="switchView('dashboard-view', this)"><i class="fa-solid fa-chart-pie"></i> Équipe, CA & Flotte</div>
        </div>
        <button onclick="sessionStorage.clear(); location.href='login.html'" class="btn" style="width:auto">Quitter</button>
    </nav>
    <div class="main-content">
        <div id="orders-view" class="view-section active">
            <div class="grid">
                <div class="card">
                    <div class="card-title">Nouveau Bon</div>
                    <form id="orderForm">
                        <div class="form-group"><label>Service</label><select id="serviceType"><option>Transfert</option><option>Mise à Dispo</option></select></div>
                        <div class="form-group"><label>Tarif (€)</label><input type="number" id="price" required></div>
                        <div class="form-group"><label>Date / Heure</label><div style="display:flex; gap:10px;"><input type="date" id="date" required><input type="time" id="time" required></div></div>
                        <div class="form-group"><label>Départ</label><input type="text" id="departure" required></div>
                        <div class="form-group"><label>Destination</label><input type="text" id="destination" required></div>
                        <div class="form-group"><label>Chauffeur</label><select id="assignedDriver" required></select></div>
                        <div class="form-group"><label>Véhicule</label><select id="assignedVehicle" required></select></div>
                        <button type="submit" class="btn">Envoyer Mission</button>
                    </form>
                </div>
                <div class="card"><div class="table-container"><table><thead><tr><th>Date</th><th>Trajet</th><th>Chauffeur</th><th>Statut</th><th>Act.</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div></div>
            </div>
        </div>
        <div id="dashboard-view" class="view-section">
            <div class="card" id="driverStatsContainer"></div>
            <div class="grid">
                <div class="card">
                    <div class="card-title">Chauffeurs</div>
                    <form id="driverForm"><input type="text" id="driverName" placeholder="Nom" required><input type="text" id="driverPassword" placeholder="MDP" required><button type="submit" class="btn" style="margin-top:10px">Ajouter</button></form>
                    <table style="margin-top:20px"><tbody id="driversTableBody"></tbody></table>
                </div>
                <div class="card">
                    <div class="card-title">Véhicules</div>
                    <form id="vehicleForm"><input type="text" id="vehicleModel" placeholder="Modèle" required><input type="text" id="vehiclePlate" placeholder="Plaque" required><button type="submit" class="btn" style="margin-top:10px">Ajouter</button></form>
                    <table style="margin-top:20px"><tbody id="vehiclesTableBody"></tbody></table>
                </div>
            </div>
        </div>
    </div>
    <div id="editDriverModal" class="modal"><div class="modal-content"><form id="editDriverForm"><h3>Modifier MDP</h3><input type="hidden" id="editDriverId"><input type="text" id="editDriverPassword" placeholder="Nouveau MDP" required><button type="submit" class="btn" style="margin-top:10px">Enregistrer</button></form></div></div>
    <script>
        function switchView(v, e) { document.querySelectorAll('.view-section').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active')); document.getElementById(v).classList.add('active'); e.classList.add('active'); }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>
