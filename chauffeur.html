<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Espace Chauffeur</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #fdfcf9; --text-main: #1e293b; --border: #e2e8f0; --success: #10b981; --danger: #ef4444; --info: #3b82f6; }
        body { background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; color: var(--text-main); }
        .card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { display: inline-block; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #fff; text-decoration: none; color: #333; font-weight: 600; font-size: 13px; cursor: pointer; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .badge-attente { background: #fef7e0; color: #b45309; }
        .badge-charge { background: #e0f2fe; color: #0369a1; }
        .badge-depose { background: #e6f4ea; color: #15803d; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2 id="driverWelcome">Mes Courses</h2>
        <button onclick="logout()" style="background:none; border:none; font-size:20px; cursor:pointer;"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
    
    <div id="chauffeurOrdersContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <script src="chauffeur.js"></script>
</body>
</html>
