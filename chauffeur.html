<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Chauffeur - Suivi Missions VTC</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            padding: 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 20px;
            color: var(--text-primary);
        }

        .driver-selector-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 0px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }

        /* Cartes de courses */
        .course-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 10px;
        }

        .course-time {
            font-size: 15px;
            font-weight: bold;
            color: var(--warning);
        }

        .badge-status {
            padding: 4px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-attente { background-color: #7f1d1d; color: #fca5a5; }
        .status-charge { background-color: #1e3a8a; color: #93c5fd; }
        .status-depose { background-color: #064e3b; color: #6ee7b7; }

        .address-block {
            margin-bottom: 15px;
            background: #111827;
            padding: 10px;
            border-radius: 6px;
        }

        .address-item {
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 6px;
        }

        .address-item:last-child {
            margin-bottom: 0;
        }

        .client-info {
            font-size: 14px;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .course-price {
            font-size: 18px;
            font-weight: bold;
            color: var(--success);
        }

        .btn-action {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-pickup { background-color: #2563eb; color: white; }
        .btn-pickup:hover { background-color: #1d4ed8; }

        .btn-dropoff { background-color: #10b981; color: white; }
        .btn-dropoff:hover { background-color: #059669; }

        .no-courses {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
            font-size: 14px;
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1><i class="fa-solid fa-car"></i> Espace Chauffeur</h1>
            <div id="connection-status" style="font-size: 12px; font-weight: bold;">
                <span style="color:#94a3b8;">● Hors ligne</span>
            </div>
        </header>

        <!-- SELECTEUR DU PROFIL DE CHAUFFEUR -->
        <div class="driver-selector-card">
            <div class="form-group">
                <label for="driverSelect">Sélectionnez votre profil :</label>
                <select id="driverSelect" required>
                    <option value="">-- Choisir un profil --</option>
                    <option value="Michel">Michel</option>
                    <option value="Chauffeur 2">Chauffeur 2 (Exemple)</option>
                </select>
            </div>
        </div>

        <!-- ZONE D'AFFICHAGE DES COURSES -->
        <div id="coursesContainer">
            <div class="no-courses">Veuillez sélectionner un profil de chauffeur pour voir vos courses.</div>
        </div>
    </div>

    <!-- SDK SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
    <!-- LOGIQUE APPLICATIVE CHAUFFEUR -->
    <script src="chauffeur.js"></script>

</body>
</html>
